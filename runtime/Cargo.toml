[package]
name = "componentize-js-runtime"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["staticlib"]

[dependencies]
anyhow = "1.0.100"
mozjs = { version = "0.14.8", default-features = false, features = ["intl", "libz-sys"] }
wit-bindgen = "0.52.0"
# TODO: switch to a release when available:
wit-dylib-ffi = { git = "https://github.com/dicej/wasm-tools", rev = "b072b0ca", features = ["async-raw"] }
